# Production: set DATABASE_URL and POSTGRES_* in .env or deploy env. Compose passes them through.

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_PORT=8080

volumes:
  postgres_data:
